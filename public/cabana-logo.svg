<!--
  CABANA-BOOK LOGO — SVG
  Circular badge showing a beach cabana hut in the brand blue palette.
  The design features:
    • Outer circle: ocean blue gradient ring
    • Inner circle: deep blue background
    • Cabana hut: thatched roof (triangle + straw lines) with two posts
    • Small sun accent in upper-right
    • Subtle sand/ground line at base
  Used in: Navbar, Login page, favicon, OG image.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Outer ring gradient — blue to teal ocean -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3b93f3"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Inner background gradient — deep ocean blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1b4eaa"/>
      <stop offset="100%" stop-color="#1a5fd1"/>
    </linearGradient>
    <!-- Roof gradient — warm sand to golden thatch -->
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Clip circle so nothing bleeds outside the round badge -->
    <clipPath id="circle">
      <circle cx="50" cy="50" r="46"/>
    </clipPath>
  </defs>

  <!-- ── Outer ring ───────────────────────────────────────── -->
  <circle cx="50" cy="50" r="49" fill="url(#ringGrad)"/>

  <!-- ── Inner dark background ───────────────────────────── -->
  <circle cx="50" cy="50" r="44" fill="url(#bgGrad)"/>

  <!-- ── Group everything inside the clip ────────────────── -->
  <g clip-path="url(#circle)">

    <!-- ── Water/sky background strip ──────────────────────
         Light teal horizon line at the bottom third -->
    <rect x="6" y="64" width="88" height="30" fill="#0e7490" opacity="0.45" rx="2"/>

    <!-- ── Sun (small accent, top-right) ────────────────── -->
    <circle cx="74" cy="28" r="7" fill="#fbbf24" opacity="0.90"/>
    <!-- Sun rays -->
    <line x1="74" y1="18" x2="74" y2="16" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="74" y1="38" x2="74" y2="40" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="64" y1="28" x2="62" y2="28" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="84" y1="28" x2="86" y2="28" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="67" y1="21" x2="65.5" y2="19.5" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="81" y1="35" x2="82.5" y2="36.5" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

    <!-- ── Cabana — two support posts ────────────────────── -->
    <rect x="32" y="56" width="5"  height="18" rx="2.5" fill="#93c5fd"/>
    <rect x="63" y="56" width="5"  height="18" rx="2.5" fill="#93c5fd"/>

    <!-- ── Cabana — main thatched roof (large triangle) ──── -->
    <polygon points="50,30 18,60 82,60" fill="url(#roofGrad)"/>

    <!-- ── Thatched straw lines across the roof ─────────── -->
    <!-- These parallel lines give the thatched look -->
    <line x1="22" y1="57" x2="40" y2="38" stroke="#b45309" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
    <line x1="27" y1="59" x2="45" y2="40" stroke="#b45309" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
    <line x1="33" y1="60" x2="50" y2="41" stroke="#b45309" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
    <line x1="39" y1="60" x2="55" y2="43" stroke="#b45309" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
    <line x1="46" y1="60" x2="61" y2="46" stroke="#b45309" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
    <line x1="53" y1="60" x2="67" y2="50" stroke="#b45309" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
    <line x1="60" y1="60" x2="73" y2="54" stroke="#b45309" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>

    <!-- ── Lower secondary roof / overhang ───────────────── -->
    <polygon points="50,44 22,63 78,63" fill="#fbbf24" opacity="0.65"/>

    <!-- ── Roof ridge top cap ────────────────────────────── -->
    <ellipse cx="50" cy="30.5" rx="5" ry="3" fill="#1d4ed8" opacity="0.7"/>

    <!-- ── Sand ground line ──────────────────────────────── -->
    <ellipse cx="50" cy="74" rx="30" ry="4" fill="#fde68a" opacity="0.35"/>

  </g>

  <!-- ── Outer ring border for polish ────────────────────── -->
  <circle cx="50" cy="50" r="49" fill="none" stroke="url(#ringGrad)" stroke-width="1.5"/>
</svg>
